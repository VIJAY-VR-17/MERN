<!DOCTYPE html>
<html>
<head>
    <title>Simple E-Commerce Website</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <h1>Online Shopping</h1>

    <hr>

    <h2>Our Products</h2>

    <table>
        <tr>
            <td>
                <img src="laptop" alt="Laptop"><br>
                <h3>Laptop</h3>
                <p>Price: ₹50,000</p>
                <button>Buy Now</button>
            </td>

            <td>
                <img src="phone" alt="Mobile"><br>
                <h3>Mobile</h3>
                <p>Price: ₹20,000</p>
                <button>Buy Now</button>
            </td>

            <td>
                <img src="headphone.jpg" alt="Headphones"><br>
                <h3>Headphones</h3>
                <p>Price: ₹2,000</p>
                <button>Buy Now</button>
            </td>
        </tr>
    </table>

    <hr>

    <h2>Customer Details</h2>

    <form>
        <label>Name:</label><br>
        <input type="text"><br><br>

        <label>Email:</label><br>
        <input type="email"><br><br>

        <label>Address:</label><br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <button>Place Order</button>
    </form>

</body>
</html>
