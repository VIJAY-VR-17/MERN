<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Concepts Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 id="title">DOM Manipulation Demo</h1>

    <p id="message">Welcome to JavaScript DOM!</p>

    <button id="changeBtn">Change Text</button>
    <button id="styleBtn">Change Style</button>
    <button id="addBtn">Add Paragraph</button>
    <button id="removeBtn">Remove Paragraph</button>
    <button id="toggleBtn">Toggle Dark Mode</button>

    <div id="content"></div>

    <hr>

    <input type="text" id="username" placeholder="Type your name">

    <p id="output"></p>

    <hr>

    <form id="myForm">
        <input type="email" placeholder="Enter Email" required>
        <button type="submit">Submit</button>
    </form>

</div>

<script src="script.js"></script>

</body>
</html>
